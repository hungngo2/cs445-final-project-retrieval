<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 34px Georgia, 'Times New Roman', serif; fill: #1e2a33; }
      .subtitle { font: 600 18px Georgia, 'Times New Roman', serif; fill: #46545f; }
      .section { font: 700 22px Georgia, 'Times New Roman', serif; fill: #1f2f3a; }
      .label { font: 600 17px Arial, Helvetica, sans-serif; fill: #1f2f3a; }
      .body { font: 15px Arial, Helvetica, sans-serif; fill: #32424d; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #56656f; }
      .box { stroke: #233845; stroke-width: 2.5; rx: 18; ry: 18; }
      .input { fill: #fdfbf6; }
      .process { fill: #e5f2ef; }
      .store { fill: #eaf0fb; }
      .analysis { fill: #f8ead9; }
      .arrow { stroke: #233845; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#233845"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860"/>
  <text class="title" x="60" y="70">OfficeQA Retrieval Architecture</text>
  <text class="subtitle" x="60" y="108">Two retrieval backbones share the same question set, page corpus, and evaluation protocol.</text>

  <text class="section" x="70" y="170">Inputs</text>
  <rect class="box input" x="60" y="190" width="270" height="110"/>
  <text class="label" x="88" y="230">OfficeQA questions CSV</text>
  <text class="body" x="88" y="258">uid, question, answer,</text>
  <text class="body" x="88" y="281">source_docs, source_files</text>

  <rect class="box input" x="60" y="335" width="270" height="120"/>
  <text class="label" x="88" y="376">Treasury Bulletin PDFs</text>
  <text class="body" x="88" y="405">24,303 pages in the full manifest</text>
  <text class="body" x="88" y="428">dense tables, repeated layouts,</text>
  <text class="body" x="88" y="451">historical financial reports</text>

  <text class="section" x="410" y="170">Offline preprocessing and indexing</text>

  <rect class="box process" x="380" y="190" width="290" height="110"/>
  <text class="label" x="408" y="230">Page manifest builder</text>
  <text class="body" x="408" y="258">PyMuPDF extracts native page text,</text>
  <text class="body" x="408" y="281">page sizes, doc IDs, and page numbers</text>

  <rect class="box store" x="730" y="190" width="260" height="110"/>
  <text class="label" x="758" y="230">Shared page manifest</text>
  <text class="body" x="758" y="258">page_manifest.jsonl</text>
  <text class="body" x="758" y="281">one record per page</text>

  <rect class="box process" x="380" y="355" width="290" height="130"/>
  <text class="label" x="408" y="395">Sparse text branch</text>
  <text class="body" x="408" y="423">tokenize page text</text>
  <text class="body" x="408" y="446">build rank-bm25 index</text>
  <text class="body" x="408" y="469">one retrievable item per page</text>

  <rect class="box store" x="730" y="365" width="260" height="110"/>
  <text class="label" x="758" y="405">BM25 page index</text>
  <text class="body" x="758" y="433">page_bm25.pkl</text>

  <rect class="box process" x="380" y="540" width="290" height="190"/>
  <text class="label" x="408" y="580">Multimodal branch</text>
  <text class="body" x="408" y="608">render page images</text>
  <text class="body" x="408" y="631">choose representation:</text>
  <text class="body" x="432" y="654">full page</text>
  <text class="body" x="432" y="677">fixed 2x2 crops</text>
  <text class="body" x="432" y="700">layout-aware regions</text>
  <text class="body" x="408" y="723">encode with CLIP or SigLIP</text>

  <rect class="box store" x="730" y="555" width="260" height="160"/>
  <text class="label" x="758" y="595">FAISS index family</text>
  <text class="body" x="758" y="623">clip_faiss_full</text>
  <text class="body" x="758" y="646">clip_faiss_fixed</text>
  <text class="body" x="758" y="669">clip_faiss_layout</text>
  <text class="body" x="758" y="692">siglip_faiss_full / fixed / layout</text>

  <text class="section" x="1070" y="170">Online retrieval and evaluation</text>

  <rect class="box analysis" x="1040" y="220" width="290" height="120"/>
  <text class="label" x="1068" y="260">Question encoding / search</text>
  <text class="body" x="1068" y="288">BM25: lexical match over page text</text>
  <text class="body" x="1068" y="311">FAISS: text-to-image similarity search</text>

  <rect class="box analysis" x="1040" y="390" width="290" height="130"/>
  <text class="label" x="1068" y="430">Page-level ranking</text>
  <text class="body" x="1068" y="458">top 50 pages per question</text>
  <text class="body" x="1068" y="481">crop and region hits aggregated</text>
  <text class="body" x="1068" y="504">back to page scores by max score</text>

  <rect class="box analysis" x="1040" y="575" width="290" height="150"/>
  <text class="label" x="1068" y="615">Evaluation outputs</text>
  <text class="body" x="1068" y="643">page Recall@1/5/10, page MRR, nDCG@10</text>
  <text class="body" x="1068" y="666">document-level recall and MRR</text>
  <text class="body" x="1068" y="689">analysis plots, qualitative slices,</text>
  <text class="body" x="1068" y="712">and report tables</text>

  <path class="arrow" d="M330 245 H380"/>
  <path class="arrow" d="M330 395 H380"/>
  <path class="arrow" d="M670 245 H730"/>
  <path class="arrow" d="M860 300 V355"/>
  <path class="arrow" d="M860 300 V540"/>
  <path class="arrow" d="M670 420 H730"/>
  <path class="arrow" d="M670 635 H730"/>
  <path class="arrow" d="M990 420 H1040"/>
  <path class="arrow" d="M990 635 H1040"/>
  <path class="arrow dash" d="M1185 340 V390"/>
  <path class="arrow dash" d="M1185 520 V575"/>

  <text class="small" x="64" y="810">Diagram focus: the same shared page corpus feeds both sparse and multimodal retrieval, enabling direct comparison of page representations rather than different datasets.</text>
</svg>
